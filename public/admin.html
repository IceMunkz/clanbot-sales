<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClanBot Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0d0f1a; --card: #16213e; --border: #1e2d50; --blue: #3b82f6; --text: #f1f5f9; --muted: #64748b; --subtle: #94a3b8; --green: #22c55e; --red: #ef4444; --orange: #fb923c; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Login */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
.login-card h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.login-card p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: var(--subtle); margin-bottom: 6px; }
.field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; font-size: 14px; color: var(--text); outline: none; }
.field input:focus { border-color: var(--blue); }
.btn { width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn:hover { background: #2563eb; }
#login-err { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }

/* Dashboard */
#dashboard { display: none; }
header { background: rgba(13,15,26,.9); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; backdrop-filter: blur(8px); }
.logo { font-size: 18px; font-weight: 800; }
.logo span { color: var(--blue); }
.header-right { display: flex; gap: 12px; align-items: center; }
.btn-sm { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-sm.secondary { background: transparent; border: 1px solid var(--border); color: var(--subtle); }
.btn-sm:hover { opacity: .85; }

main { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
.stat-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-val { font-size: 32px; font-weight: 900; }
.stat-val.green { color: var(--green); }
.stat-val.orange { color: var(--orange); }
.stat-val.red { color: var(--red); }

/* Add token */
.panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 28px; }
.panel h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.token-form { display: flex; gap: 10px; flex-wrap: wrap; }
.token-form input { flex: 1; min-width: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; font-size: 13px; color: var(--text); outline: none; font-family: monospace; }
.token-form input:focus { border-color: var(--blue); }
#token-msg { font-size: 13px; margin-top: 10px; }

/* Orders table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 12px 12px; border-bottom: 1px solid rgba(255,255,255,.04); color: var(--subtle); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
.badge.active { background: rgba(34,197,94,.15); color: var(--green); }
.badge.pending { background: rgba(251,146,60,.15); color: var(--orange); }
.badge.provisioning { background: rgba(59,130,246,.15); color: #60a5fa; }
.badge.failed { background: rgba(239,68,68,.15); color: var(--red); }
.badge.awaiting_approval { background: rgba(251,146,60,.15); color: var(--orange); }
.badge.suspended { background: rgba(148,163,184,.15); color: var(--subtle); }
.badge.past_due { background: rgba(239,68,68,.15); color: var(--red); }
.badge.deleted { background: rgba(100,116,139,.15); color: var(--muted); }
.provision-btn { background: var(--blue); color: #fff; border: none; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
.provision-btn:hover { background: #2563eb; }
.act-btn { border: none; border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer; margin-right: 4px; color: #fff; }
.act-btn.green { background: #16a34a; }
.act-btn.blue { background: var(--blue); }
.act-btn.orange { background: #d97706; }
.act-btn.red { background: var(--red); }
.act-btn:hover { opacity: .85; }
code { font-family: monospace; font-size: 11px; color: #60a5fa; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Admin Panel</h1>
    <p>Enter your admin token to continue.</p>
    <div class="field">
      <label>Admin Token</label>
      <input type="password" id="token-input" placeholder="••••••••••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" onclick="login()">Sign In</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <div class="logo">Clan<span>Bot</span> Admin</div>
    <div class="header-right">
      <button class="btn-sm" id="test-order-btn" style="display:none;background:#7c3aed" onclick="createTestOrder()">🧪 Test Order</button>
      <button class="btn-sm secondary" onclick="loadData()">↻ Refresh</button>
    </div>
  </header>
  <main>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Tokens Available</div><div class="stat-val green" id="stat-tokens">—</div></div>
      <div class="stat-card"><div class="stat-label">Ports Available</div><div class="stat-val green" id="stat-ports">—</div></div>
      <div class="stat-card"><div class="stat-label">Active Bots</div><div class="stat-val" id="stat-active">—</div></div>
      <div class="stat-card"><div class="stat-label">Failed Orders</div><div class="stat-val red" id="stat-failed">—</div></div>
    </div>

    <!-- Add token -->
    <div class="panel">
      <h2>🔑 Add Bot Token to Pool</h2>
      <div class="token-form">
        <input type="text" id="t-client-id" placeholder="Client ID (e.g. 1234567890123456789)">
        <input type="text" id="t-bot-token" placeholder="Bot token (e.g. MTIz...)">
        <button class="btn-sm" onclick="addToken()">Add Token</button>
      </div>
      <div id="token-msg"></div>
    </div>

    <!-- Orders -->
    <div class="panel">
      <h2>📋 Orders</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Email</th>
              <th>Steam</th>
              <th>Status</th>
              <th>Port</th>
              <th>Setup URL</th>
              <th>Pelican ID</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
let adminToken = '';

async function apiFetch(path, opts = {}) {
  return fetch(path, {
    ...opts,
    headers: { 'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json', ...(opts.headers || {}) },
  });
}

async function login() {
  const t = document.getElementById('token-input').value.trim();
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  const res = await fetch('/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: t }),
  });
  if (res.ok) {
    adminToken = t;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadData();
  } else {
    err.textContent = 'Invalid token.';
    err.style.display = 'block';
  }
}

async function loadData() {
  const res = await apiFetch('/admin/stats');
  if (!res.ok) return;
  const data = await res.json();

  document.getElementById('test-order-btn').style.display = data.test_orders_enabled ? 'inline-block' : 'none';
  document.getElementById('stat-tokens').textContent = data.tokens_available;

  const portsAvail = data.ports.find(p => p.status === 'available')?.n || 0;
  document.getElementById('stat-ports').textContent = portsAvail;
  document.getElementById('stat-active').textContent = data.orders.filter(o => o.status === 'active').length;
  document.getElementById('stat-failed').textContent = data.orders.filter(o => o.status === 'failed').length;

  const tbody = document.getElementById('orders-tbody');
  if (!data.orders.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted);">No orders yet.</td></tr>';
    return;
  }

  tbody.innerHTML = data.orders.map(o => `
    <tr>
      <td style="color:var(--text);font-weight:600;">#${o.id}</td>
      <td>${o.customer_email}</td>
      <td>${o.steam_id ? `<code>${o.steam_id}</code>` : '—'}</td>
      <td><span class="badge ${o.status}">${(o.status || '').replace(/_/g,' ')}</span></td>
      <td>${o.pelican_port || '—'}</td>
      <td>${o.setup_url ? `<a href="${o.setup_url}/setup" target="_blank" style="color:#60a5fa;">${o.setup_url}</a>` : '—'}</td>
      <td>${o.pelican_server_id || '—'}</td>
      <td style="font-size:12px;">${o.created_at?.slice(0,16).replace('T',' ') || '—'}</td>
      <td style="white-space:nowrap;">${rowActions(o)}</td>
    </tr>
  `).join('');
}

async function addToken() {
  const clientId = document.getElementById('t-client-id').value.trim();
  const botToken = document.getElementById('t-bot-token').value.trim();
  const msg = document.getElementById('token-msg');
  if (!clientId || !botToken) { msg.style.color = '#f87171'; msg.textContent = 'Both fields required.'; return; }
  const res = await apiFetch('/admin/tokens', { method: 'POST', body: JSON.stringify({ client_id: clientId, bot_token: botToken }) });
  const data = await res.json();
  if (res.ok) {
    msg.style.color = '#22c55e';
    msg.textContent = `✓ Token added. Pool size: ${data.pool_size}`;
    document.getElementById('t-client-id').value = '';
    document.getElementById('t-bot-token').value = '';
    loadData();
  } else {
    msg.style.color = '#f87171';
    msg.textContent = data.error || 'Error adding token.';
  }
}

function rowActions(o) {
  const s = o.status;
  if (s === 'awaiting_approval' || s === 'pending' || s === 'failed')
    return `<button class="act-btn green" onclick="provision(${o.id})">Provision</button>`;
  if (s === 'active')
    return `<button class="act-btn blue" onclick="lifecycle('restart',${o.id})">Restart</button>`
         + `<button class="act-btn orange" onclick="lifecycle('suspend',${o.id})">Suspend</button>`
         + `<button class="act-btn red" onclick="lifecycle('delete',${o.id})">Delete</button>`;
  if (s === 'suspended' || s === 'past_due')
    return `<button class="act-btn green" onclick="lifecycle('resume',${o.id})">Resume</button>`
         + `<button class="act-btn red" onclick="lifecycle('delete',${o.id})">Delete</button>`;
  return '';
}

async function createTestOrder() {
  const res = await apiFetch('/admin/test-order', { method: 'POST' });
  const data = await res.json();
  if (res.ok) { loadData(); }
  else { alert('Error: ' + (data.error || 'unknown')); }
}

async function provision(orderId) {
  if (!confirm(`Provision order #${orderId}? This creates the customer's bot server.`)) return;
  const res = await apiFetch(`/admin/provision/${orderId}`, { method: 'POST' });
  const data = await res.json();
  if (res.ok) { alert('Provisioned!'); loadData(); }
  else { alert('Error: ' + (data.error || 'unknown')); }
}

async function lifecycle(verb, orderId) {
  const labels = { suspend: 'Suspend (pause)', resume: 'Resume', restart: 'Restart', delete: 'DELETE — frees the port + bot token' };
  if (!confirm(`${labels[verb] || verb} order #${orderId}?`)) return;
  const res = await apiFetch(`/admin/${verb}/${orderId}`, { method: 'POST' });
  const data = await res.json();
  if (res.ok) { loadData(); }
  else { alert('Error: ' + (data.error || 'unknown')); }
}
</script>

</body>
</html>
